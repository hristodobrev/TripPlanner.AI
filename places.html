<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trip Planner - Places</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 40px 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            color: white;
            margin-bottom: 50px;
            font-size: 2.5em;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        .places-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 30px;
            margin-bottom: 40px;
        }

        .place-card {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            display: flex;
            flex-direction: column;
        }

        .place-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.4);
        }

        .place-image {
            width: 100%;
            height: 250px;
            object-fit: cover;
            background: #f0f0f0;
        }

        .place-content {
            padding: 25px;
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .place-header {
            margin-bottom: 15px;
        }

        .place-name {
            font-size: 1.8em;
            color: #333;
            margin-bottom: 5px;
            font-weight: 600;
        }

        .place-country {
            color: #667eea;
            font-size: 1em;
            font-weight: 500;
        }

        .place-description {
            color: #666;
            line-height: 1.6;
            font-size: 0.95em;
            margin-bottom: 15px;
            flex: 1;
        }

        .place-credit {
            border-top: 1px solid #eee;
            padding-top: 12px;
            font-size: 0.85em;
            color: #999;
        }

        .place-credit a {
            color: #667eea;
            text-decoration: none;
            transition: color 0.3s ease;
        }

        .place-credit a:hover {
            color: #764ba2;
            text-decoration: underline;
        }

        .credit-author {
            margin-bottom: 5px;
        }

        .credit-source {
            font-size: 0.8em;
        }

        .loading {
            text-align: center;
            color: white;
            font-size: 1.2em;
        }

        .error {
            text-align: center;
            color: #ff6b6b;
            background: white;
            padding: 20px;
            border-radius: 8px;
            max-width: 600px;
            margin: 0 auto;
        }

        @media (max-width: 768px) {
            .places-grid {
                grid-template-columns: 1fr;
            }

            h1 {
                font-size: 2em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🌍 Trip Planner - Explore Places</h1>
        <div id="places-container" class="places-grid">
            <div class="loading">Loading places...</div>
        </div>
    </div>

    <script>
        async function loadPlaces() {
            try {
                const response = await fetch('places.json');
                if (!response.ok) {
                    throw new Error('Failed to load places.json');
                }
                const places = await response.json();
                displayPlaces(places);
            } catch (error) {
                displayError(error.message);
            }
        }

        function displayPlaces(places) {
            const container = document.getElementById('places-container');
            container.innerHTML = '';

            places.forEach(place => {
                const card = document.createElement('div');
                card.className = 'place-card';
                
                card.innerHTML = `
                    <img src="${place.imageUrl}" alt="${place.name}" class="place-image">
                    <div class="place-content">
                        <div class="place-header">
                            <div class="place-name">${place.name}</div>
                            <div class="place-country">📍 ${place.country}</div>
                        </div>
                        <div class="place-description">${place.description}</div>
                        <div class="place-credit">
                            <div class="credit-author">
                                Photo by <a href="${place.imageAuthorUrl}" target="_blank">${place.imageAuthor}</a>
                            </div>
                            <div class="credit-source">
                                Source: ${place.imageSource}
                            </div>
                        </div>
                    </div>
                `;
                
                container.appendChild(card);
            });
        }

        function displayError(message) {
            const container = document.getElementById('places-container');
            container.innerHTML = `<div class="error">Error: ${message}</div>`;
        }

        // Load places when the page loads
        document.addEventListener('DOMContentLoaded', loadPlaces);
    </script>
</body>
</html>
